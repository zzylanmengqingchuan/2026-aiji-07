<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>坦克大战网络检测</title>
<style>
body{font-family:system-ui,sans-serif;max-width:720px;margin:40px auto;padding:0 18px;color:#111}
h1{font-size:28px}.item{border:2px solid #111;padding:12px;margin:10px 0}.ok{background:#d9fbdc}.bad{background:#ffd9d5}
button{border:2px solid #111;background:#f5f06e;padding:10px 18px;font-weight:700;cursor:pointer}code{word-break:break-all}
</style>
</head>
<body>
<h1>坦克大战网络检测</h1>
<p>本页只连接当前游戏域名，用来判断问题出在网页、三维资源还是实时连接。</p>
<button id="run" type="button">重新检测</button>
<div id="results"></div>
<script>
'use strict';
const results=document.getElementById('results');
function row(name,ok,detail){
  const el=document.createElement('div');
  el.className='item '+(ok?'ok':'bad');
  el.innerHTML='<strong>'+(ok?'通过：':'失败：')+name+'</strong><br><code>'+String(detail||'')+'</code>';
  results.appendChild(el);
}
async function run(){
  results.innerHTML='';
  row('页面地址',true,location.origin);
  try{
    const r=await fetch('/health',{cache:'no-store'});
    const j=await r.json();
    row('游戏服务接口',r.ok&&j.ok,JSON.stringify(j));
  }catch(e){row('游戏服务接口',false,e.message)}
  try{
    const r=await fetch('/vendor/three/three.min.js',{method:'HEAD',cache:'no-store'});
    row('本站三维引擎资源',r.ok,'状态码 '+r.status);
  }catch(e){row('本站三维引擎资源',false,e.message)}
  await new Promise(resolve=>{
    const proto=location.protocol==='https:'?'wss:':'ws:';
    const ws=new WebSocket(proto+'//'+location.host);
    const timer=setTimeout(()=>{row('实时对战连接',false,'连接超时；请检查防火墙是否拦截安全实时连接');try{ws.close()}catch{}resolve()},5000);
    ws.onopen=()=>{clearTimeout(timer);row('实时对战连接',true,'连接成功');ws.close();resolve()};
    ws.onerror=()=>{clearTimeout(timer);row('实时对战连接',false,'连接被网络或防火墙阻断');resolve()};
  });
}
document.getElementById('run').onclick=run;
run();
</script>
</body>
</html>
