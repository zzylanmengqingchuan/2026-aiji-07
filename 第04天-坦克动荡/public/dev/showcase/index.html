<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>坦克混战 · 视觉素材预览</title>
<style>
  :root{--ink:#18212b;--panel:#263340;--accent:#f0c94d;--paper:#eef0e8;--muted:#a9b4b1}
  *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#111820;color:var(--paper);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  body{padding:28px;background:radial-gradient(circle at 65% 0,#293949 0,#18212b 45%,#10161d 100%)}
  header{display:flex;align-items:flex-end;justify-content:space-between;margin:0 auto 18px;max-width:1380px}
  h1{font:900 30px/1 system-ui,sans-serif;margin:0;letter-spacing:-.03em}h1 b{color:var(--accent)}
  header p{margin:8px 0 0;color:var(--muted);font-size:12px}.status{color:#83d99a;font-weight:800}
  main{max-width:1380px;margin:auto;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px}
  .card{background:rgba(38,51,64,.86);border:1px solid rgba(255,255,255,.1);border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.28);overflow:hidden}
  .stage{position:relative;height:760px}.stage canvas{width:100%;height:100%;display:block}
  .stage-label{position:absolute;left:18px;top:18px;padding:9px 12px;border-radius:12px;background:rgba(24,33,43,.76);backdrop-filter:blur(12px);font-size:12px;border:1px solid rgba(255,255,255,.1)}
  .legend{position:absolute;left:18px;bottom:18px;display:flex;gap:8px;flex-wrap:wrap}.legend span,.tag{padding:7px 10px;border-radius:99px;background:rgba(24,33,43,.78);font-size:11px;border:1px solid rgba(255,255,255,.1)}
  aside{display:grid;gap:18px;align-content:start}.section{padding:18px}.section h2{font:800 15px/1.2 system-ui,sans-serif;margin:0 0 14px}
  .swatches{display:grid;grid-template-columns:1fr 1fr;gap:8px}.swatch{height:72px;border-radius:14px;padding:9px;display:flex;align-items:flex-end;font-size:10px;font-weight:900;color:white;text-shadow:0 1px 3px #0008;box-shadow:inset 0 0 0 1px #fff2}
  .checks{display:grid;gap:9px}.check{display:flex;gap:9px;align-items:center;padding:10px;border-radius:12px;background:#1b2630;color:#c8d1ce;font-size:11px}.check i{width:9px;height:9px;border-radius:50%;background:#74d88e;box-shadow:0 0 12px #74d88e}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{background:#1b2630;padding:12px;border-radius:12px}.metric strong{display:block;color:var(--accent);font-size:21px}.metric small{color:var(--muted)}
  @media(max-width:980px){main{grid-template-columns:1fr}.stage{height:620px}aside{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <div><h1>视觉地基 <b>SHOWCASE</b></h1><p>全部模型、贴图和特效均由代码程序化生成 · 无外部美术资源</p></div>
  <div class="status" id="readyState">正在预热渲染器…</div>
</header>
<main>
  <section class="card stage">
    <canvas id="stage"></canvas>
    <div class="stage-label">林间训练场材质台 · 暖色主光 / 环境光 / 雾 / ACES</div>
    <div class="legend"><span>程序化沙地</span><span>平涂坦克</span><span>木箱</span><span>炮口火光</span><span>爆炸冲击波</span><span>尾气</span></div>
  </section>
  <aside>
    <section class="card section"><h2>全局调色盘</h2><div class="swatches" id="swatches"></div></section>
    <section class="card section"><h2>自检指标</h2><div class="metrics"><div class="metric"><strong id="fps">--</strong><small>平均帧率</small></div><div class="metric"><strong id="draws">--</strong><small>绘制调用</small></div></div></section>
    <section class="card section"><h2>视觉部件</h2><div class="checks"><div class="check"><i></i>512×512 可重复沙地纹理</div><div class="check"><i></i>低多边形平涂材质</div><div class="check"><i></i>队伍色 + 程序化迷彩</div><div class="check"><i></i>柔和阴影与暖色主光</div><div class="check"><i></i>火光、冲击波、烟尘</div><div class="check"><i></i>可降级的性能预算</div></div></section>
  </aside>
</main>
<script src="/vendor/three/three.min.js"></script>
<script src="/js/visual-foundation.js"></script>
<script>
'use strict';
const {PALETTE,createGroundTexture,createCamoTexture}=TankVisuals;
const swatches=document.getElementById('swatches');
for(const [name,color] of Object.entries(PALETTE)){
  const el=document.createElement('div');el.className='swatch';el.style.background=color;el.textContent=`${name}  ${color}`;swatches.appendChild(el);
}
const canvas=document.getElementById('stage'),renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance',alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.15));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=.94;
const scene=new THREE.Scene();scene.background=new THREE.Color(PALETTE.sky);scene.fog=new THREE.Fog(PALETTE.sky,24,54);
const camera=new THREE.PerspectiveCamera(38,1,.1,100);camera.position.set(14,12,18);camera.lookAt(0,1,0);
scene.add(new THREE.HemisphereLight(0xe8f2ef,0x354331,.86));const sun=new THREE.DirectionalLight(0xffd9a0,1.55);sun.position.set(-8,15,9);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);sun.shadow.camera.left=-16;sun.shadow.camera.right=16;sun.shadow.camera.top=16;sun.shadow.camera.bottom=-16;scene.add(sun);
const groundTex=createGroundTexture(THREE,512);groundTex.repeat.set(3.5,3.5);groundTex.anisotropy=Math.min(8,renderer.capabilities.getMaxAnisotropy());
const ground=new THREE.Mesh(new THREE.PlaneGeometry(27,22),new THREE.MeshStandardMaterial({map:groundTex,roughness:1}));ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
function tank(color,x,z){
  const g=new THREE.Group(),mat=new THREE.MeshStandardMaterial({color:0xffffff,map:createCamoTexture(THREE,color,PALETTE.forest),roughness:.7,metalness:.06,flatShading:true}),dark=new THREE.MeshStandardMaterial({color:PALETTE.track,roughness:.92,flatShading:true});
  const body=new THREE.Mesh(new THREE.BoxGeometry(3.2,1,4.2,1,1,1),mat);body.position.y=1;body.castShadow=true;g.add(body);
  for(const side of [-1,1]){const tread=new THREE.Mesh(new THREE.BoxGeometry(.55,.72,4.5),dark);tread.position.set(side*1.72,.65,0);tread.castShadow=true;g.add(tread)}
  const turret=new THREE.Mesh(new THREE.CylinderGeometry(1.05,1.25,.72,8),mat);turret.position.y=1.75;turret.castShadow=true;g.add(turret);
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.13,.19,3.2,7),dark);barrel.rotation.x=Math.PI/2;barrel.position.set(0,1.82,2);barrel.castShadow=true;g.add(barrel);
  g.position.set(x,0,z);scene.add(g);return g;
}
const heroTank=tank(PALETTE.teamGreen,-3,0),enemyTank=tank(PALETTE.teamOrange,6,-3);enemyTank.rotation.y=-.72;
function crate(x,z,r){const g=new THREE.Group(),wood=new THREE.MeshStandardMaterial({color:PALETTE.wood,roughness:.95,flatShading:true}),edge=new THREE.MeshStandardMaterial({color:PALETTE.sandDark,roughness:1});const box=new THREE.Mesh(new THREE.BoxGeometry(2,2,2),wood);box.castShadow=true;g.add(box);for(const y of [-.78,.78]){const b=new THREE.Mesh(new THREE.BoxGeometry(2.18,.16,2.18),edge);b.position.y=y;g.add(b)}g.position.set(x,1,z);g.rotation.y=r;scene.add(g)}
crate(-8,-4,.24);crate(3,5,-.32);
const markerMaterials=[PALETTE.concrete,PALETTE.wood,PALETTE.teamBlue,PALETTE.teamGold].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:.72,flatShading:true}));
markerMaterials.forEach((m,i)=>{const mesh=new THREE.Mesh(new THREE.IcosahedronGeometry(.78,1),m);mesh.position.set(-8+i*2.2,.8,5.5);mesh.castShadow=true;scene.add(mesh)});
const ring=new THREE.Mesh(new THREE.RingGeometry(.72,1.08,32),new THREE.MeshBasicMaterial({color:PALETTE.teamOrange,transparent:true,opacity:.82,side:THREE.DoubleSide,depthWrite:false}));ring.rotation.x=-Math.PI/2;ring.position.set(4,.08,1);scene.add(ring);
const flash=new THREE.Group();flash.position.set(-3,1.85,4);scene.add(flash);
const flashCore=new THREE.Mesh(new THREE.OctahedronGeometry(.72,0),new THREE.MeshBasicMaterial({color:PALETTE.glow,transparent:true,depthWrite:false}));flash.add(flashCore);
const flame=new THREE.Mesh(new THREE.ConeGeometry(.48,1.75,6),new THREE.MeshBasicMaterial({color:PALETTE.teamOrange,transparent:true,opacity:.82,depthWrite:false}));flame.rotation.x=Math.PI/2;flame.position.z=.82;flash.add(flame);
const point=new THREE.PointLight(PALETTE.glow,2.6,9);point.position.copy(flash.position);scene.add(point);
const smokePos=new Float32Array(90*3);for(let i=0;i<90;i++)smokePos[i*3+1]=-99;const smokeGeo=new THREE.BufferGeometry();smokeGeo.setAttribute('position',new THREE.BufferAttribute(smokePos,3));const smoke=new THREE.Points(smokeGeo,new THREE.PointsMaterial({color:0x394942,size:1.05,transparent:true,opacity:.62,depthWrite:false,sizeAttenuation:true}));scene.add(smoke);let smokeCursor=0;
function emitSmoke(){for(let k=0;k<3;k++){const i=smokeCursor++%90;smokePos[i*3]=-3+(Math.random()-.5)*.42;smokePos[i*3+1]=.9+Math.random()*.18;smokePos[i*3+2]=-2.1+(Math.random()-.5)*.4}}
let last=performance.now(),frames=0,elapsed=0,readyAt=0;
function resize(){const box=canvas.getBoundingClientRect();renderer.setSize(box.width,box.height,false);camera.aspect=box.width/box.height;camera.updateProjectionMatrix()}resize();addEventListener('resize',resize);
function loop(now){requestAnimationFrame(loop);const dt=Math.min(.05,(now-last)/1000);last=now;frames++;elapsed+=dt;
  heroTank.position.y=Math.sin(now*.004)*.025;heroTank.rotation.z=Math.sin(now*.0021)*.018;enemyTank.rotation.y+=dt*.08;
  const pulse=(Math.sin(now*.006)+1)*.5;flash.scale.setScalar(.7+pulse*.85);flashCore.material.opacity=.55+pulse*.45;flame.material.opacity=.48+pulse*.45;point.intensity=.8+pulse*2.6;ring.scale.setScalar(.75+pulse*1.75);ring.material.opacity=.86-pulse*.58;
  if(frames%5===0)emitSmoke();for(let i=0;i<90;i++){if(smokePos[i*3+1]<-10)continue;smokePos[i*3+1]+=dt*.68;smokePos[i*3]+=(i%3-1)*dt*.18;smokePos[i*3+2]-=dt*.25;if(smokePos[i*3+1]>3.5)smokePos[i*3+1]=-99}smokeGeo.attributes.position.needsUpdate=true;
  renderer.render(scene,camera);
  if(elapsed>=1){const fps=Math.round(frames/elapsed);document.getElementById('fps').textContent=fps;document.getElementById('draws').textContent=renderer.info.render.calls;window.__showcaseMetrics={fps,drawCalls:renderer.info.render.calls,triangles:renderer.info.render.triangles};frames=0;elapsed=0;if(!readyAt)readyAt=now}
  if(readyAt&&now-readyAt>700){window.__showcaseReady=true;document.getElementById('readyState').textContent='● 渲染稳定，可截图验收'}
}requestAnimationFrame(loop);
</script>
</body>
</html>
