# 安装到服务器：/etc/nginx/conf.d/tank.conf
# Cloudflare 橙云代理 + SSL Flexible：用户 HTTPS → CF → 源站 HTTP:80 → 本机 3099
#
# 域名：tank.xiaoxiaole.space

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name tank.xiaoxiaole.space;

    # 真实 IP（经 Cloudflare 时可选）
    # set_real_ip_from 173.245.48.0/20; ... 完整列表见 Cloudflare 文档

    location / {
        proxy_pass http://127.0.0.1:3099;
        proxy_http_version 1.1;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 若希望后端认为始终是 https（Flexible 时 CF→源站是 http）
        # 更稳妥：用 CF 带来的头；人类浏览器侧已是 https
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
